name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Bump patch version in pom.xml
        id: version
        run: |
          CURRENT="$(mvn -B -ntp help:evaluate -Dexpression=project.version -q -DforceStdout)"
          IFS='.' read -r major minor patch <<< "${CURRENT//-SNAPSHOT/}"
          NEW="${major}.${minor}.$((patch + 1))"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "new=${NEW}" >> "$GITHUB_OUTPUT"
          mvn -B -ntp org.codehaus.mojo:versions-maven-plugin:2.17.1:set \
            -DnewVersion="${NEW}" \
            -DgenerateBackupPom=false

      - name: Build release JAR
        run: mvn -B -ntp package

      - name: Commit version bump, tag, and publish release
        env:
          NEW_VERSION: ${{ steps.version.outputs.new }}
          GH_TOKEN: ${{ github.token }}
        run: |
          JAR="target/WHIMC-OverworldAgent-${NEW_VERSION}.jar"
          test -f "${JAR}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore(release): bump version to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}"

          git push origin main
          git push origin "v${NEW_VERSION}"

          gh release create "v${NEW_VERSION}" \
            "${JAR}" \
            --title "v${NEW_VERSION}" \
            --generate-notes
