name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [animal-ai, llm-agent]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build plugin JAR
        run: mvn -B -ntp package
